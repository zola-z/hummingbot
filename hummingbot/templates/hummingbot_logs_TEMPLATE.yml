---
version: 1
template_version: 13

formatters:
    simple:
        format: "%(asctime)s - %(process)d - %(name)s - %(levelname)s - %(message)s"

handlers:
    console:
        class: hummingbot.logger.cli_handler.CLIHandler
        level: DEBUG
        formatter: simple
        stream: ext://sys.stdout
    console_warning:
        class: hummingbot.logger.cli_handler.CLIHandler
        level: WARNING
        formatter: simple
        stream: ext://sys.stdout
    console_info:
        class: hummingbot.logger.cli_handler.CLIHandler
        level: INFO
        formatter: simple
        stream: ext://sys.stdout
    file_handler:
        class: logging.handlers.TimedRotatingFileHandler
        level: DEBUG
        formatter: simple
        filename: $PROJECT_DIR/logs/logs_$STRATEGY_FILE_PATH.log
        encoding: utf8
        when: "D"
        interval: 1
        backupCount: 7
    "null":
        class: logging.NullHandler
        level: DEBUG

loggers:
    hummingbot.core.utils.eth_gas_station_lookup:
        level: NETWORK
        propagate: false
        handlers: [console, file_handler]
        mqtt: true
    hummingbot.logger.log_server_client:
        level: WARNING
        propagate: false
        handlers: [console, file_handler]
        mqtt: true
    hummingbot.logger.reporting_proxy_handler:
        level: WARNING
        propagate: false
        handlers: [console, file_handler]
        mqtt: true
    hummingbot.strategy:
        level: NETWORK
        propagate: false
        handlers: [console, file_handler]
        mqtt: true
    hummingbot.connector:
        level: NETWORK
        propagate: false
        handlers: [console, file_handler]
        mqtt: true
    hummingbot.client:
        level: NETWORK
        propagate: false
        handlers: [console, file_handler]
        mqtt: true
    hummingbot.core.event.event_reporter:
        level: EVENT_LOG
        propagate: false
        handlers: [file_handler]
        mqtt: false
    conf:
        level: NETWORK
        handlers: ["null"]
        propagate: false
        mqtt: false
    # NMMMS 策略代码(engine.*)日志。必须显式声明: headless 启动会调用 init_logging 两次
    # (quick_start 一次、run_application 再一次), 而第二次 dictConfig 默认
    # disable_existing_loggers=True — 此时 engine.* logger 已在首次 strategy 加载时创建,
    # 若不在配置中显式命名(或祖先被命名), 会被整体 disable, 导致 "config hot-updated"/
    # "RISK HALT received" 等确认日志静默消失(曾被误判为 pub/sub 消费失效)。命名顶层
    # 包 engine 即可保护所有 engine.* 子 logger 不被 disable。
    engine:
        level: INFO
        propagate: false
        handlers: [console, file_handler]
        mqtt: false

root:
    level: INFO
    handlers: [console, file_handler]
    mqtt: true
